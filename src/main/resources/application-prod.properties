# =====================================================
# Perfil de PRODUÇÃO - Arena Beach Tennis
# Ativado com: SPRING_PROFILES_ACTIVE=prod
# =====================================================

# Server
server.port=8080

# Banco H2 - Producão (arquivo persistente, console DESABILITADO)
spring.datasource.url=jdbc:h2:file:./data/beachtennis;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console DESABILITADO em produção por segurança
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Segurança de frames
spring.headers.frame-options=deny

# Logging mais enxuto em produção
logging.level.root=WARN
logging.level.com.beachtennis=INFO
