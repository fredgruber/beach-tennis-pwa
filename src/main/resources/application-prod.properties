# =====================================================
# Perfil de PRODUÇÃO - Arena Beach Tennis
# Ativado com: SPRING_PROFILES_ACTIVE=prod
# =====================================================

# Server
server.port=${PORT:8080}

# Banco PostgreSQL (Neon) - Credenciais via variáveis de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# H2 Console DESABILITADO em produção
spring.h2.console.enabled=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Segurança de frames
spring.headers.frame-options=deny

# Logging mais enxuto em produção
logging.level.root=WARN
logging.level.com.beachtennis=INFO
